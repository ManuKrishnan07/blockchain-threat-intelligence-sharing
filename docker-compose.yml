version: "3.9"

services:

  mongodb:
    image: mongo:7.0
    container_name: dtisp_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ganache:
    image: trufflesuite/ganache:latest
    container_name: dtisp_ganache
    restart: unless-stopped
    ports:
      - "7545:8545"
    command: >
      --mnemonic "test test test test test test test test test test test junk"
      --accounts 10
      --chain.chainId 1337
      --database.dbPath /ganache_db
    volumes:
      - ganache_data:/ganache_db

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: dtisp_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI:            "mongodb://mongodb:27017"
      GANACHE_URL:          "http://ganache:8545"
      CONTRACT_CONFIG_PATH: "/app/contract_config.json"
    depends_on:
      - mongodb
      - ganache

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: dtisp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  ganache_data: